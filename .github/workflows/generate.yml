name: Generate gRPC Code

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Protos Repo
        uses: actions/checkout@v3

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Protoc and Plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"

      - name: Generate Go Code
        run: |
          mkdir -p gen/go
          protoc --proto_path=proto proto/*.proto \
            --go_out=gen/go --go_opt=paths=source_relative \
            --go-grpc_out=gen/go --go-grpc_opt=paths=source_relative

      - name: Push to Generated Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Клонируем Repo B 
          git clone https://x-access-token:${GH_PAT}@github.com/dannieey/assignment2-generated.git out
          
          # Очищаем старые файлы и копируем новые
          rm -rf out/order out/payment
          cp -r gen/go/* out/
          
          cd out
          
          if [ ! -f go.mod ]; then
            go mod init github.com/dannieey/assignment2-generated
          fi
          
          go mod tidy
          git add .
          git commit -m "Update generated code" || echo "No changes"
          git push origin main