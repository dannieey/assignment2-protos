syntax = "proto3";

package payment;

option go_package = "github.com/dannieey/assignment2-generated/payment";

import "google/protobuf/timestamp.proto";

service PaymentService {
    rpc ProcessPayment (PaymentRequest) returns (PaymentResponse);
    rpc GetPaymentStats (PaymentStatsRequest) returns (PaymentStatsResponse);
}

message PaymentRequest {
    string order_id = 1;
    double amount = 2;
}

message PaymentResponse {
    string transaction_id = 1;
    string status = 2;
    google.protobuf.Timestamp created_at = 3;
}

message PaymentStatsRequest {}

message PaymentStatsResponse {
    int32 total_count = 1;
    map<string, int32> status_counts = 2;
}